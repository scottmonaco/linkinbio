  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --black: #0d0d0d;
      --muted: #999;
      --gap: 3px;
    }

    html, body {
      background: var(--white);
      color: var(--black);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 28px;
      gap: 18px;
    }

    .logo {
      width: clamp(160px, 45vw, 260px);
      height: auto;
      display: block;
    }

    /* ============================================================
       SUBSCRIBE BUTTON FONT — change 'Bebas Neue' to any Google Font
       ============================================================ */
    .substack-btn {
      display: inline-block;
      padding: 10px 28px;
      background: var(--black);
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif; /* ← CHANGE FONT HERE */
      font-size: 15px;
      letter-spacing: 0.2em;
      text-decoration: none;
      transition: background 0.2s;
    }

    .substack-btn:hover {
      background: #333;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #ddd;
    }

    /* ============================================================
       INSTRUCTION TEXT FONT — change 'Cormorant Garamond' to any Google Font
       ============================================================ */
    .instruction {
      font-family: 'Cormorant Garamond', serif; /* ← CHANGE FONT HERE */
      font-style: italic;
      font-weight: 300;
      font-size: clamp(13px, 3vw, 15px);
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
      padding: var(--gap);
    }

    .card {
      position: relative;
      aspect-ratio: 9/16;
      overflow: hidden;
      display: block;
      text-decoration: none;
    }

    /* All images start slightly desaturated and dimmed */
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(40%) brightness(0.82);
      transition: filter 0.4s ease, transform 0.5s ease;
    }

    /* Hover: full color, full brightness, slight zoom */
    .card:hover img {
      filter: grayscale(0%) brightness(1);
      transform: scale(1.03);
    }

    footer {
      text-align: center;
      padding: 40px 24px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      color: #bbb;
      letter-spacing: 0.1em;
    }

    @media (max-width: 480px) {
      header { padding: 32px 16px 20px; }
    }
  </style>
</head>
